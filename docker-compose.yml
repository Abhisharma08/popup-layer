version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: poplayer-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: poplayer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: poplayer-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
