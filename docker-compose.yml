services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: poplayer
      POSTGRES_USER: poplayer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - poplayer_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poplayer -d poplayer"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://poplayer:${POSTGRES_PASSWORD}@db:5432/poplayer?schema=public
      JWT_SECRET: ${JWT_SECRET:?set in .env}
      FRONTEND_URL: ${FRONTEND_URL:-}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      PUBLIC_EMBED_URL: ${PUBLIC_EMBED_URL:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?set in .env}
        VITE_EMBED_URL: ${VITE_EMBED_URL:?set in .env}
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  poplayer_db:
